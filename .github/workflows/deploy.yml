name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Namecheap VPS via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # - name: Type check
      #   run: npm run ts.check

      - name: Build TypeScript
        run: npm run build

      - name: Install production node_modules
        run: npm ci --omit=dev

      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.FTP_HOST }}" || (echo "Missing FTP_HOST" && exit 1)
          test -n "${{ secrets.FTP_USER }}" || (echo "Missing FTP_USER" && exit 1)
          test -n "${{ secrets.FTP_PASSWORD }}" || (echo "Missing FTP_PASSWORD" && exit 1)
          test -n "${{ secrets.FTP_PORT }}" || (echo "Missing FTP_PORT" && exit 1)

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          # server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/src/**
            **/.github/**
            **/.env*
            **/tsconfig.json
            **/*.md
            **/.DS_Store
            **/node_modules/**

